<style>

.logo-area { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }

.stat { text-align: center; cursor: pointer; padding: 6px 13px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.08); background: rgba(0,0,0,0.02); transition: all 0.2s; user-select: none; min-width: 66px; }

.stat.active-filter { border-color: #2ec4b6; background: rgba(46,196,182,0.1); box-shadow: 0 0 14px rgba(46,196,182,0.15); }
.stat strong { display: block; font-size: 1.35rem; color: #2ec4b6; line-height: 1.1; font-weight: 700; }
.stat small { font-size: 0.64rem; color: rgba(0,0,0,0.4); text-transform: uppercase; letter-spacing: 0.8px; }
.stat[data-filter="New"] strong { color: #3d5170; }
.stat[data-filter="New"].active-filter { border-color: #3d5170; background: rgba(61,81,112,0.07); }
#btn-export:hover { box-shadow: 0 4px 20px rgba(46,196,182,0.4); transform: translateY(-1px); }
#btn-save:hover { background: #2e3d52; transform: translateY(-1px); }

.save-toast { position:fixed;bottom:24px;right:24px;background:#2ec4b6;color:#fff;padding:10px 18px;border-radius:8px;font-size:0.82rem;font-weight:600;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none; }
.save-toast.show { opacity:1; }

/* FILTERS */
#filters { display: none; position: sticky; top: 74px; z-index: 90; background: #ffffff; backdrop-filter: none; border-bottom: 1px solid rgba(0,0,0,0.08); padding: 11px 28px; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
.fg { display: flex; flex-direction: column; gap: 3px; }
.fg label { font-size: 0.65rem; font-weight: 700; color: #2ec4b6; text-transform: uppercase; letter-spacing: 0.6px; }
.fg select, .fg input { border: 1px solid rgba(0,0,0,0.12); border-radius: 6px; padding: 6px 9px; font-size: 0.8rem; background: #fff; color: #1a1a2e; outline: none; transition: border-color 0.2s; font-family: inherit; }
.fg select:focus, .fg input:focus { border-color: #2ec4b6; }
.fg select option { background: #fff; color: #1a1a2e; }
#search-input { width: 205px; }
#btn-reset { padding: 6px 13px; border: 1px solid rgba(0,0,0,0.12); border-radius: 6px; background: #fff; color: rgba(0,0,0,0.45); font-size: 0.78rem; cursor: pointer; align-self: flex-end; transition: all 0.2s; font-family: inherit; }
#btn-reset:hover { background: #f5f5f5; color: #1a1a2e; }
#result-count { align-self: flex-end; font-size: 0.75rem; color: rgba(0,0,0,0.35); margin-left: auto; }

/* LOAD PROMPT */
#load-prompt { position: relative; z-index: 1; text-align: center; padding: 130px 32px; }
#load-prompt h2 { font-size: 2rem; font-weight: 700; color: #e8edf5; margin-bottom: 10px; letter-spacing: 0.5px; }
#load-prompt p { color: rgba(255,255,255,0.45); margin-bottom: 32px; font-size: 0.92rem; }
#file-input-label { display: inline-block; padding: 13px 34px; background: linear-gradient(135deg,#2ec4b6,#25b0a0); color: #fff; border-radius: 8px; cursor: pointer; font-size: 0.92rem; font-weight: 700; letter-spacing: 0.3px; transition: all 0.2s; box-shadow: 0 4px 22px rgba(46,196,182,0.25); }
#file-input-label:hover { box-shadow: 0 6px 30px rgba(46,196,182,0.4); transform: translateY(-2px); }
#file-input { display: none; }

#cards-container { display: none; position: relative; z-index: 1; padding: 22px 28px; grid-template-columns: repeat(auto-fill,minmax(330px,1fr)); gap: 15px; }
.card { background: #3d5170; backdrop-filter: none; border: 1px solid rgba(255,255,255,0.1); border-left: 3px solid rgba(255,255,255,0.1); border-radius: 11px; padding: 17px 19px 15px; display: flex; flex-direction: column; gap: 9px; transition: box-shadow 0.2s,transform 0.15s; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
.card:hover { box-shadow: 0 8px 30px rgba(0,0,0,0.25); transform: translateY(-2px); background: #445a7a; }
.card.priority-High { border-left-color: #2ecc71; }
.card.priority-Medium { border-left-color: #f39c12; }
.card.priority-Low { border-left-color: rgba(255,255,255,0.15); }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.card-company { font-size: 0.96rem; font-weight: 700; color: #ffffff; line-height: 1.3; word-break: break-word; }

.badge-High { background: rgba(46,204,113,0.18); color: #2ecc71; border: 1px solid rgba(46,204,113,0.4); }
.badge-Medium { background: rgba(243,156,18,0.18); color: #f39c12; border: 1px solid rgba(243,156,18,0.4); }
.badge-Low { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.12); }
.badge-source-Adzuna { background: rgba(255,255,255,0.1); color: #c8d6e8; border: 1px solid rgba(255,255,255,0.2); }
.badge-source-Reed { background: rgba(46,196,182,0.15); color: #2ec4b6; border: 1px solid rgba(46,196,182,0.35); }
.card-title { font-size: 0.85rem; font-weight: 600; color: #2ec4b6; line-height: 1.35; word-break: break-word; }

.card-category { font-size: 0.68rem; font-weight: 600; color: #2ec4b6; background: rgba(46,196,182,0.12); border: 1px solid rgba(46,196,182,0.3); padding: 2px 8px; border-radius: 4px; display: inline-block; width: fit-content; }

<script>
// ── LOGO ─────────────────────────────────────────────────────────────────────

// ── NETWORK ───────────────────────────────────────────────────────────────────
(function(){
  const cv=document.getElementById('network-canvas'),ctx=cv.getContext('2d');
  let W,H,nodes=[],t=0;
  const N=72,D=160;
  function rz(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
  function rnd(a,b){return Math.random()*(b-a)+a;}
  function hsl(h,s,l){return `hsl(${h},${s}%,${l}%)`;}
  function init(){
    nodes=[];
    for(let i=0;i<N;i++)nodes.push({x:rnd(0,W),y:rnd(0,H),vx:rnd(-0.25,0.25),vy:rnd(-0.25,0.25),rad:rnd(1.5,3.2),phase:rnd(0,Math.PI*2),speed:rnd(0.012,0.035),hoff:rnd(0,360)});
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    t+=0.4;
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const a=nodes[i],b=nodes[j],dx=a.x-b.x,dy=a.y-b.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<D){
          const al=(1-d/D)*0.22;
          const h=(t+a.hoff)%360;
          ctx.strokeStyle=`hsla(${h},70%,55%,${al})`;
          ctx.lineWidth=0.6;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
        }
      }
    }
    for(const n of nodes){
      n.phase+=n.speed;
      const gl=0.5+0.5*Math.sin(n.phase);
      const h=(t+n.hoff)%360;
      const al=0.25+0.5*gl;
      ctx.beginPath();ctx.arc(n.x,n.y,n.rad,0,Math.PI*2);
      ctx.fillStyle=`hsla(${h},75%,55%,${al})`;ctx.fill();
      ctx.beginPath();ctx.arc(n.x,n.y,n.rad*2.8,0,Math.PI*2);
      ctx.fillStyle=`hsla(${h},75%,65%,${0.04*gl})`;ctx.fill();
      n.x+=n.vx;n.y+=n.vy;
      if(n.x<-20)n.x=W+20;if(n.x>W+20)n.x=-20;if(n.y<-20)n.y=H+20;if(n.y>H+20)n.y=-20;
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',()=>{rz();init();});
  rz();init();draw();
})();

// ── STORAGE ───────────────────────────────────────────────────────────────────
const CONTACT_FIELDS=['contact_name','contact_title','contact_linkedin','contact_email','contact_mobile','contact_phone','status'];
const LS_KEY='ac_lead_contacts';
const LS_DELETED='ac_deleted_leads';
let autoSaveOn=false;

function getDeleted(){
  try{return new Set(JSON.parse(localStorage.getItem(LS_DELETED)||'[]'));}catch(e){return new Set();}
}
function markDeleted(key){
  const d=getDeleted();d.add(key);
  localStorage.setItem(LS_DELETED,JSON.stringify([...d]));
}
function deleteLead(key,globalIdx){
  markDeleted(key);
  allLeads.splice(globalIdx,1);
  filtered=filtered.filter(function(l){
    return (l.url||l.company+'|'+l.title)!==key;
  });
  updateStats();
  document.getElementById('result-count').textContent=filtered.length.toLocaleString()+' result'+(filtered.length!==1?'s':'');
  render();
  showToast('Recruiter advert removed');
}

function loadFromStorage(){
  try{
    const saved=JSON.parse(localStorage.getItem(LS_KEY)||'{}');
    allLeads.forEach(function(lead){
      const key=lead.url||lead.company+'|'+lead.title;
      if(saved[key]){CONTACT_FIELDS.forEach(function(f){if(saved[key][f]!==undefined)lead[f]=saved[key][f];});}
    });
  }catch(e){}
}
function saveToStorage(){
  try{
    const map={};
    allLeads.forEach(function(lead){
      const key=lead.url||lead.company+'|'+lead.title;
      const hasData=CONTACT_FIELDS.some(function(f){return lead[f]&&lead[f]!=='New';});
      if(hasData){map[key]={};CONTACT_FIELDS.forEach(function(f){map[key][f]=lead[f]||'';});}
    });
    localStorage.setItem(LS_KEY,JSON.stringify(map));
    showToast('Changes saved');
  }catch(e){showToast('Save failed: '+e.message);}
}

const EMBEDDED=JSON.parse(document.getElementById('lead-data').textContent||'[]');
let allLeads=[],filtered=[],suspectedFilterOn=false;
const PAGE_SIZE=30;
let currentPage=1;
const SO=['New','Researching','Outreach sent','Meeting booked','Proposal sent','Won','Not a fit'];

// Recruiter suspicion detector
const REC_COMPANY=/confidential|undisclosed|our client|a leading|not specified|not disclosed|tba|tbc|various|anonymous/i;
const REC_DESC=/our client|on behalf of|my client|the client|we('re| are) recruit|retained search|exclusive (search|mandate)|superb opportunity|fantastic opportunity|excellent opportunity|we have been instructed|appointed to recruit|vacancy (has|have) arisen|send (your |)(cv|resume)|submit (your |)(cv|resume)|are you (looking|seeking)/i;
const REC_TITLE=/apply now|apply today|new role|new opportunity|now hiring|immediate start|contract role|interim role/i;
function isSuspectedRecruiter(lead){
  // Prefer the pre-computed flag from Python scan
  if(lead.suspected_recruiter==='true') return true;
  if(lead.suspected_recruiter==='false') return false;
  // Fallback: client-side heuristic for leads not yet scanned
  const co=lead.company||'', title=lead.title||'';
  let score=0;
  if(REC_COMPANY.test(co)) score+=3;
  if(REC_TITLE.test(title)) score+=2;
  return score>=2;
}

function parseCSV(t){
  const lines=t.split(/\r?\n/),hdr=spl(lines[0]),rows=[];
  for(let i=1;i<lines.length;i++){if(!lines[i].trim())continue;const v=spl(lines[i]),o={};hdr.forEach((h,idx)=>o[h.trim()]=(v[idx]||'').trim());rows.push(o);}
  return rows;
}
function spl(line){
  const res=[];let cur='',q=false;
  for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){if(q&&line[i+1]==='"'){cur+='"';i++;}else q=!q;}else if(c===','&&!q){res.push(cur);cur='';}else cur+=c;}
  res.push(cur);return res;
}
function ps(s){if(!s||s==='Not listed')return 0;return parseInt(s.replace(/[^\d]/g,''))||0;}

document.getElementById('file-input').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();rd.onload=ev=>{allLeads=parseCSV(ev.target.result);loadData();};rd.readAsText(f,'utf-8');
});

};
try{

function loadData(){
  document.getElementById('load-prompt').style.display='none';
  document.getElementById('filters').style.display='flex';
  document.getElementById('cards-container').style.display='grid';
  document.getElementById('pagination').style.display='flex';

  document.getElementById('autosave-toggle').style.display='flex';
  loadFromStorage();
  const cats=[...new Set(allLeads.map(r=>r.category))].sort(),cs=document.getElementById('filter-category');
  cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;cs.appendChild(o);});
  const sts=[...new Set(allLeads.map(r=>r.status))].sort(),ss=document.getElementById('filter-status');
  sts.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;ss.appendChild(o);});
  updateStats();syncBtns();applyFilters();
}

function updateStats(){
  document.getElementById('stat-total').textContent=allLeads.length.toLocaleString();
  document.getElementById('stat-high').textContent=allLeads.filter(r=>r.priority==='High').length.toLocaleString();
  document.getElementById('stat-medium').textContent=allLeads.filter(r=>r.priority==='Medium').length.toLocaleString();
  document.getElementById('stat-new').textContent=allLeads.filter(r=>r.status==='New').length.toLocaleString();
  document.getElementById('stat-suspected').textContent=allLeads.filter(isSuspectedRecruiter).length.toLocaleString();
}

function applyFilters(){
  const q=document.getElementById('search-input').value.toLowerCase(),
    pr=document.getElementById('filter-priority').value,
    ca=document.getElementById('filter-category').value,
    so=document.getElementById('filter-source').value,
    st=document.getElementById('filter-status').value,
    sv=document.getElementById('filter-salary').value,
    sm=parseInt(sv)||0,lo=sv==='listed';
  filtered=allLeads.filter(r=>{
    if(q&&!`${r.company} ${r.title} ${r.location}`.toLowerCase().includes(q))return false;
    if(pr&&r.priority!==pr)return false;
    if(ca&&r.category!==ca)return false;
    if(so&&r.source!==so)return false;
    if(st&&r.status!==st)return false;
    if(lo&&r.salary==='Not listed')return false;
    if(sm>0&&ps(r.salary)<sm)return false;
    if(suspectedFilterOn&&!isSuspectedRecruiter(r))return false;
    return true;
  });
  filtered.sort((a,b)=>{
    const ae=!!(a.contact_email||'').trim(), be=!!(b.contact_email||'').trim();
    if(ae&&!be)return -1; if(!ae&&be)return 1; return 0;
  });
  currentPage=1;
  document.getElementById('result-count').textContent=`${filtered.length.toLocaleString()} result${filtered.length!==1?'s':''}`;
  render();
}

function render(){
  const c=document.getElementById('cards-container');
  [...c.children].forEach(ch=>{if(ch.id!=='empty-state')ch.remove();});
  if(!filtered.length){document.getElementById('empty-state').style.display='block';document.getElementById('pagination').style.display='none';return;}
  document.getElementById('empty-state').style.display='none';
  const st=(currentPage-1)*PAGE_SIZE;
  filtered.slice(st,st+PAGE_SIZE).forEach((lead,idx)=>{
    const card=document.createElement('div');
    const suspected=isSuspectedRecruiter(lead);
    card.className='card priority-'+lead.priority+(suspected?' suspected-recruiter':'');
    const sal=lead.salary&&lead.salary!=='Not listed'?lead.salary:'Not listed';
    const viewBtn=lead.url?'<a class="btn-view" href="'+eu(lead.url)+'" target="_blank" rel="noopener">View Job</a>':'';
    const leadKey=lead.url||lead.company+'|'+lead.title;
    const opts=SO.map(function(s){return '<option value="'+s+'"'+(s===lead.status?' selected':'')+'>'+s+'</option>';}).join('');
    card.innerHTML=
      (suspected?'<div class="rec-warning">⚠ Suspected recruiter advert</div>':'')+
      '<div class="card-header">'+
        '<div class="card-company">'+e(lead.company)+'</div>'+
        '<div class="badge-row"><span class="badge badge-'+lead.priority+'">'+e(lead.priority)+'</span><span class="badge badge-source-'+lead.source+'">'+e(lead.source)+'</span></div>'+
      '</div>'+
      '<div class="card-title">'+e(lead.title)+'</div>'+
      '<div class="card-meta">'+
        '<span>'+e(lead.location||'—')+'</span>'+
        '<span>'+e(sal)+'</span>'+
        '<span>'+e(lead.date_posted||lead.date_found)+'</span>'+
      '</div>'+
      '<span class="card-category">'+e(lead.category)+'</span>'+
      '<div class="card-contacts">'+
        '<div class="cr"><label>Name</label><input class="contact-input'+(lead.contact_name?' filled':'')+'" type="text" placeholder="Contact name" value="'+e(lead.contact_name||'')+'" data-field="contact_name" data-idx="'+(st+idx)+'"></div>'+
        '<div class="cr"><label>Title</label><input class="contact-input'+(lead.contact_title?' filled':'')+'" type="text" placeholder="Job title" value="'+e(lead.contact_title||'')+'" data-field="contact_title" data-idx="'+(st+idx)+'"></div>'+
        '<div class="cr"><label>LinkedIn</label><input class="contact-input'+(lead.contact_linkedin?' filled':'')+'" type="text" placeholder="linkedin.com/in/" value="'+e(lead.contact_linkedin||'')+'" data-field="contact_linkedin" data-idx="'+(st+idx)+'"></div>'+
        '<div class="cr"><label>Email</label><input class="contact-input'+(lead.contact_email?' filled':'')+'" type="text" placeholder="email@company.com" value="'+e(lead.contact_email||'')+'" data-field="contact_email" data-idx="'+(st+idx)+'"></div>'+
        '<div class="cr"><label>Mobile</label><input class="contact-input'+(lead.contact_mobile?' filled':'')+'" type="text" placeholder="+44 7" value="'+e(lead.contact_mobile||'')+'" data-field="contact_mobile" data-idx="'+(st+idx)+'"></div>'+
        '<div class="cr"><label>Phone</label><input class="contact-input'+(lead.contact_phone?' filled':'')+'" type="text" placeholder="+44 1" value="'+e(lead.contact_phone||'')+'" data-field="contact_phone" data-idx="'+(st+idx)+'"></div>'+
      '</div>'+
      '<div class="card-footer">'+
        '<select class="status-select" data-idx="'+(st+idx)+'">'+opts+'</select>'+
        viewBtn+
        '<button class="btn-email" data-idx="'+(st+idx)+'">Draft Email</button>'+
        '<button class="btn-recruiter" data-key="'+e(leadKey)+'" data-idx="'+(st+idx)+'">Recruiter</button>'+
      '</div>'+
      '<div style="padding:4px 0 2px;"><span class="card-date">Found '+e(lead.date_found)+'</span></div>';
    c.appendChild(card);
  });
  c.querySelectorAll('.status-select').forEach(sel=>{
    sel.addEventListener('change',function(ev){const i=parseInt(ev.target.dataset.idx);filtered[i].status=ev.target.value;const g=allLeads.indexOf(filtered[i]);if(g>=0)allLeads[g].status=ev.target.value;updateStats();if(autoSaveOn)saveToStorage();});
  });
  c.querySelectorAll('.btn-email').forEach(function(btn){
    btn.addEventListener('click',function(){
      const i=parseInt(btn.dataset.idx);
      openEmailModal(filtered[i]);
    });
  });

    btn.addEventListener('click',function(){
      const key=btn.dataset.key;
      const idx=parseInt(btn.dataset.idx);
      if(confirm('Mark as recruiter advert and remove it?')){deleteLead(key,idx);}
    });
  });
  c.querySelectorAll('.contact-input').forEach(inp=>{
    inp.addEventListener('input',function(ev){
      const i=parseInt(ev.target.dataset.idx),f=ev.target.dataset.field;
      filtered[i][f]=ev.target.value;
      const g=allLeads.indexOf(filtered[i]);if(g>=0)allLeads[g][f]=ev.target.value;
      ev.target.classList.toggle('filled',!!ev.target.value);
      if(autoSaveOn)saveToStorage();
    });
  });
  renderPag();
}
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function eu(s){return String(s||'').replace(/"/g,'&quot;');}

function renderPag(){
  const tot=Math.ceil(filtered.length/PAGE_SIZE),pag=document.getElementById('pagination');
  pag.innerHTML='';pag.style.display=tot<=1?'none':'flex';if(tot<=1)return;
  const prev=mk('← Prev','page-btn',currentPage===1,()=>{currentPage--;render();scrollTo(0,0);});pag.appendChild(prev);
  pgR(currentPage,tot).forEach(p=>{
    if(p==='...'){const s=document.createElement('span');s.textContent='…';s.style.cssText='padding:0 4px;color:rgba(255,255,255,0.22)';pag.appendChild(s);return;}
    pag.appendChild(mk(p,'page-btn'+(p===currentPage?' active':''),false,()=>{currentPage=p;render();scrollTo(0,0);}));
  });
  const info=document.createElement('span');info.id='page-info';
  const s=(currentPage-1)*PAGE_SIZE+1,en=Math.min(currentPage*PAGE_SIZE,filtered.length);
  info.textContent=`${s}–${en} of ${filtered.length}`;pag.appendChild(info);
  pag.appendChild(mk('Next →','page-btn',currentPage===tot,()=>{currentPage++;render();scrollTo(0,0);}));
}
function mk(txt,cls,dis,fn){const b=document.createElement('button');b.className=cls;b.textContent=txt;b.disabled=dis;b.addEventListener('click',fn);return b;}
function pgR(c,t){if(t<=7)return Array.from({length:t},(_,i)=>i+1);if(c<=4)return[1,2,3,4,5,'...',t];if(c>=t-3)return[1,'...',t-4,t-3,t-2,t-1,t];return[1,'...',c-1,c,c+1,'...',t];}

function buildEmail(lead,tpl,sender){
